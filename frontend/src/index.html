<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <title>AI Charactermancer</title>
  </head>
  <body>
    <!-- process polyfill: Bun substitutes process.env.BUN_PUBLIC_* at bundle time,
         but if a variable is unset in dev the raw process reference would throw.
         This ensures process.env always exists as a fallback. -->
    <script>globalThis.process ??= { env: {} };</script>
    <div id="root"></div>
    <script type="module" src="./frontend.tsx"></script>
  </body>
</html>
